name: DART Daily Screener

on:
  schedule:
    - cron: '0 21 * * 0-4'  # UTC 21:00 = KST 06:00 (월~금 새벽)
  workflow_dispatch:

jobs:
  screen:
    runs-on: ubuntu-latest
    timeout-minutes: 350  # 약 5.8시간 (한국 전체 분석)
    permissions:
      contents: write
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          pip install requests pandas
      
      - name: Run DART screener
        env:
          DART_API_KEY: ${{ secrets.DART_API_KEY }}
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
        run: |
          python DART_screener.py
      
      - name: Commit and push results
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          git add -A
          git diff --staged --quiet || git commit -m "Daily DART analysis $(date +'%Y-%m-%d %H:%M')"
          git push
